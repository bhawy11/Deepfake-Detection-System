<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Valentine Invite 💌</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    h1 { color: #e6005c; }
    button {
      margin: 10px;
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }
    .yes { background: #ff4d88; color: white; }
    .no { background: #ddd; position: absolute; }
  </style>
</head>
<body>

  <div class="card">
    <h1>Hey 💕</h1>
    <p>Will you be my Valentine? 🌹</p>
    <button class="yes" onclick="yes()">Yes 💖</button>
    <button class="no" onmouseover="moveNo()">No 🙈</button>
  </div>

  <script>
    function yes() {
      document.body.innerHTML =
        "<div class='card'><h1>You made my day 😍</h1><p>Happy Valentine’s Day 💘</p></div>";
    }

    function moveNo() {
      const b = document.querySelector('.no');
      b.style.left = Math.random() * (window.innerWidth - 100) + 'px';
      b.style.top = Math.random() * (window.innerHeight - 50) + 'px';
    }
  </script>

</body>
</html>
